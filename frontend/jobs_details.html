<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal — Job Details</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <style>
    .details-layout { display: grid; grid-template-columns: 1fr 320px; gap: 24px; align-items: start; }
    @media (max-width: 768px) { .details-layout { grid-template-columns: 1fr; } }

    .detail-section { margin-bottom: 28px; }
    .detail-section h3 { font-size: 14px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; color: var(--ink-3); margin-bottom: 10px; }
    .detail-section p, .detail-section li { font-size: 15px; color: var(--ink-2); line-height: 1.75; }
    .detail-section ul { padding-left: 18px; }
    .detail-section ul li { margin-bottom: 4px; }

    .meta-list { display: flex; flex-direction: column; gap: 14px; }
    .meta-item { display: flex; align-items: flex-start; gap: 12px; }
    .meta-item .meta-icon { font-size: 18px; flex-shrink: 0; width: 28px; text-align: center; }
    .meta-item .meta-label { font-size: 12px; color: var(--ink-3); }
    .meta-item .meta-val { font-size: 14px; font-weight: 500; color: var(--ink); }

    .sticky-sidebar { position: sticky; top: 80px; }

    .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--ink-2); margin-bottom: 20px; cursor: pointer; }
    .back-link:hover { color: var(--ink); opacity: 1; }

    .job-detail-title { font-size: clamp(1.5rem, 3vw, 2.2rem); margin-bottom: 8px; }
    .job-detail-company { font-size: 16px; color: var(--ink-2); margin-bottom: 16px; }
  </style>
</head>
<body data-page="job-details">
  <div id="topNav"></div>

  <main class="container py-4">
    <a class="back-link" onclick="history.back()">← Back to jobs</a>

    <div id="detailsAlert"></div>
    <div id="jobDetails"></div>
  </main>

  <script src="portal-common.js"></script>
  <script src="../assets/js/common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/jobs.js"></script>
</body>
</html>
