<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal — Create Account</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <style>
    .role-toggle {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px;
    }
    .role-btn {
      padding: 16px; border: 1.5px solid var(--border); border-radius: 10px;
      cursor: pointer; text-align: center; transition: all var(--transition);
      background: var(--surface);
    }
    .role-btn:hover { border-color: var(--accent); }
    .role-btn.active { border-color: var(--accent); background: var(--accent-2); }
    .role-btn .role-icon { font-size: 22px; margin-bottom: 6px; }
    .role-btn .role-name { font-size: 14px; font-weight: 500; color: var(--ink); }
    .role-btn .role-desc { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
    .fields-section { margin-top: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
    .register-wrap { max-width: 560px; }
    .auth-logo { font-family: 'Fraunces', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 36px; display: block; }
    .auth-logo span { color: var(--accent); }
  </style>
</head>
<body>
  <div id="topNav"></div>

  <div class="auth-wrap" style="align-items:flex-start; padding-top: 40px;">
    <div class="register-wrap w-full">
      <a href="index.html" class="auth-logo">Job<span>Portal</span></a>
      <h1 style="font-size:1.8rem; margin-bottom:6px;">Create your account</h1>
      <p class="text-muted mb-4">Join thousands finding and posting jobs every day.</p>

      <div id="authAlert"></div>

      <!-- Role picker -->
      <div class="role-toggle" id="roleToggle">
        <div class="role-btn active" data-role="job_seeker">
          <div class="role-icon">🔍</div>
          <div class="role-name">Job Seeker</div>
          <div class="role-desc">Find & apply for jobs</div>
        </div>
        <div class="role-btn" data-role="employer">
          <div class="role-icon">🏢</div>
          <div class="role-name">Employer</div>
          <div class="role-desc">Post jobs & hire</div>
        </div>
      </div>

      <input type="hidden" id="role" value="job_seeker">

      <form id="registerForm">
        <div class="form-row mb-3">
          <div class="form-group">
            <label class="lbl" for="full_name">Full Name</label>
            <input id="full_name" class="input" type="text" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label class="lbl" for="phone">Phone</label>
            <input id="phone" class="input" type="text" placeholder="+1 555 000 0000">
          </div>
        </div>
        <div class="form-row mb-3">
          <div class="form-group">
            <label class="lbl" for="email">Email address</label>
            <input id="email" class="input" type="email" placeholder="you@example.com" required>
          </div>
          <div class="form-group">
            <label class="lbl" for="password">Password</label>
            <input id="password" class="input" type="password" placeholder="Min 4 characters" minlength="4" required>
          </div>
        </div>

        <!-- Job seeker fields -->
        <div id="jobSeekerFields" class="section-box fields-section mb-3">
          <div class="section-box-title">Professional Info</div>
          <div class="form-row mb-3">
            <div class="form-group">
              <label class="lbl" for="skills">Skills</label>
              <input id="skills" class="input" type="text" placeholder="e.g. Python, React, SQL">
            </div>
            <div class="form-group">
              <label class="lbl" for="education">Education</label>
              <input id="education" class="input" type="text" placeholder="e.g. B.Sc Computer Science">
            </div>
          </div>
          <div class="form-group">
            <label class="lbl" for="experience_years">Years of Experience</label>
            <input id="experience_years" class="input" type="number" min="0" placeholder="0" style="max-width:160px">
          </div>
        </div>

        <!-- Employer fields -->
        <div id="employerFields" class="section-box fields-section mb-3 hidden">
          <div class="section-box-title">Company Info</div>
          <div class="form-row">
            <div class="form-group">
              <label class="lbl" for="company_name">Company Name</label>
              <input id="company_name" class="input" type="text" placeholder="Acme Corp">
            </div>
            <div class="form-group">
              <label class="lbl" for="company_website">Company Website</label>
              <input id="company_website" class="input" type="url" placeholder="https://acme.com">
            </div>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block mb-3" id="submitBtn">Create Account</button>
      </form>

      <p class="text-sm text-muted text-center">
        Already have an account? <a href="login.html">Sign in →</a>
      </p>
    </div>
  </div>

  <script src="portal-common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script>
    // Role toggle
    document.querySelectorAll('.role-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const role = btn.dataset.role;
        document.getElementById('role').value = role;
        document.getElementById('jobSeekerFields').classList.toggle('hidden', role !== 'job_seeker');
        document.getElementById('employerFields').classList.toggle('hidden', role !== 'employer');
      });
    });
  </script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
