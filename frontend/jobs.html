<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal — Jobs</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <style>
    .filter-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr;
      gap: 12px;
      align-items: end;
    }
    @media (max-width: 900px) { .filter-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 480px) { .filter-grid { grid-template-columns: 1fr; } }
    .filter-actions { display: flex; gap: 8px; align-items: center; }
    @media (max-width: 900px) { .filter-actions { grid-column: 1 / -1; } }
  </style>
</head>
<body data-page="jobs">
  <div id="topNav"></div>

  <main class="container py-4">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 style="font-size:1.8rem; margin-bottom:2px;">Jobs</h1>
        <p class="text-sm text-muted" id="resultsCount">Loading positions…</p>
      </div>
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
    </div>

    <div id="jobsAlert"></div>

    <!-- Filters -->
    <div class="filter-card mb-4">
      <form id="filterForm">
        <div class="filter-grid">
          <div class="form-group">
            <label class="lbl">Search</label>
            <input class="input" name="search" type="text" placeholder="Title or keyword…">
          </div>
          <div class="form-group">
            <label class="lbl">Type</label>
            <select class="input" name="job_type">
              <option value="">Any type</option>
              <option value="full_time">Full Time</option>
              <option value="part_time">Part Time</option>
              <option value="contract">Contract</option>
              <option value="internship">Internship</option>
              <option value="remote">Remote</option>
            </select>
          </div>
          <div class="form-group">
            <label class="lbl">Location</label>
            <input class="input" name="location" type="text" placeholder="City…">
          </div>
          <div class="form-group">
            <label class="lbl">Min Salary</label>
            <input class="input" name="min_salary" type="number" min="0" placeholder="0">
          </div>
          <div class="form-group">
            <label class="lbl">Max Salary</label>
            <input class="input" name="max_salary" type="number" min="0" placeholder="∞">
          </div>
          <div class="form-group">
            <label class="lbl">Exp (yrs)</label>
            <input class="input" name="experience" type="number" min="0" placeholder="Any">
          </div>
        </div>
        <div class="filter-actions" style="margin-top:14px">
          <button class="btn btn-primary" type="submit">Search</button>
          <button class="btn btn-ghost" type="button" id="clearFilters">Clear filters</button>
        </div>
      </form>
    </div>

    <!-- Jobs grid -->
    <div id="jobsList" class="jobs-grid"></div>

    <!-- Pagination -->
    <div class="pagination" id="paginationBar" style="display:none">
      <button id="prevPage" class="btn btn-ghost btn-sm">← Previous</button>
      <span class="page-info" id="jobsPagination"></span>
      <button id="nextPage" class="btn btn-ghost btn-sm">Next →</button>
    </div>
  </main>

  <script src="portal-common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/jobs.js"></script>
</body>
</html>
