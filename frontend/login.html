<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobPortal — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="portal.css">
  <style>
    body { background: var(--bg); }
    .auth-side {
      width: 100%; max-width: 440px;
    }
    .auth-logo { font-family: 'Fraunces', serif; font-size: 1.4rem; color: var(--ink); margin-bottom: 36px; display: block; }
    .auth-logo span { color: var(--accent); }
    .auth-title { font-size: 2rem; margin-bottom: 6px; }
    .auth-sub { color: var(--ink-2); font-size: 15px; margin-bottom: 32px; }
    .or-row { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .or-row::before, .or-row::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .or-row span { font-size: 12px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div id="topNav"></div>

  <div class="auth-wrap">
    <div class="auth-side">
      <a href="index.html" class="auth-logo">Job<span>Portal</span></a>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-sub">Sign in to your account to continue.</p>

      <div id="authAlert"></div>

      <form id="loginForm">
        <div class="form-group mb-3">
          <label class="lbl" for="email">Email address</label>
          <input id="email" class="input" type="email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group mb-4">
          <label class="lbl" for="password">Password</label>
          <input id="password" class="input" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign In</button>
      </form>

      <div class="or-row"><span>OR</span></div>

      <p class="text-sm text-muted text-center">
        Don't have an account? <a href="register.html">Create one →</a>
      </p>
    </div>
  </div>

  <script src="portal-common.js"></script>
  <script src="../assets/js/api.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
